name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
          
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # NOTE: You MUST change "your-hf-username" and "RuralX-AI" below to your actual Hugging Face username and Space name!
        run: |
          git push --force https://your-hf-username:$HF_TOKEN@huggingface.co/spaces/Zainqjajan/RuralX-AI main
