<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RuralX AI | Sign In</title>
    <meta name="description" content="Sign in or create your RuralX AI account to access AI-powered chest X-ray diagnostics.">
    <link rel="manifest" href="/manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/auth.css">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
        }
    </script>
</head>
<body>
<div class="auth-container">

    <a href="/" class="auth-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Back to Home
    </a>

    <div class="auth-card">

        <!-- Logo -->
        <div class="auth-logo">
            <div class="auth-logo-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <path d="M21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3C16.9706 3 21 7.02944 21 12Z" stroke="#fff" stroke-width="2"/>
                    <path d="M12 8V16M8 12H16" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
                </svg>
            </div>
            <span class="auth-logo-name">RuralX <span class="auth-logo-ai">AI</span></span>
        </div>

        <!-- Tabs -->
        <div class="auth-tabs">
            <button class="auth-tab" id="tabSignIn" onclick="switchTab('signin')">Sign In</button>
            <button class="auth-tab active" id="tabSignUp" onclick="switchTab('signup')">Create Account</button>
        </div>

        <!-- ── SIGN IN FORM ── -->
        <div id="signinForm" style="display:none;">
            <div class="form-title">Welcome back</div>
            <div class="form-sub">Sign in to your RuralX AI account</div>

            <div class="field-group">
                <label for="siEmail">Email Address</label>
                <div class="input-wrap">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    <input type="email" id="siEmail" placeholder="doctor@clinic.com" autocomplete="email">
                </div>
            </div>

            <div class="field-group">
                <label for="siPassword">Password</label>
                <div class="input-wrap">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    <input type="password" id="siPassword" placeholder="Enter password" autocomplete="current-password">
                    <button type="button" class="toggle-pw" onclick="togglePw('siPassword', this)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>

            <button class="auth-btn" id="signinBtn" onclick="handleSignIn()">
                <span id="signinBtnText">Sign In</span>
            </button>
            <div class="auth-message" id="signinMsg"></div>
        </div>

        <!-- ── SIGN UP FORM ── -->
        <div id="signupForm">
            <div class="form-title">Create Account</div>
            <div class="form-sub">Join the future of diagnostic imaging</div>

            <div class="field-group">
                <label for="suName">Full Name</label>
                <div class="input-wrap">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <input type="text" id="suName" placeholder="Dr. John Smith" autocomplete="name">
                </div>
            </div>

            <div class="field-group">
                <label for="suEmail">Email Address</label>
                <div class="input-wrap">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    <input type="email" id="suEmail" placeholder="doctor@clinic.com" autocomplete="email">
                </div>
            </div>

            <div class="field-row">
                <div class="field-group">
                    <label for="suPhone">Phone</label>
                    <div class="input-wrap">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13.1a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.59 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                        <input type="tel" id="suPhone" placeholder="+91 98765..." autocomplete="tel">
                    </div>
                </div>
                <div class="field-group">
                    <label for="suDob">Date of Birth</label>
                    <div class="input-wrap">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                        <input type="date" id="suDob" autocomplete="bday">
                    </div>
                </div>
            </div>

            <div class="field-group">
                <label for="suPassword">Password</label>
                <div class="input-wrap">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    <input type="password" id="suPassword" placeholder="Min. 6 characters" autocomplete="new-password">
                    <button type="button" class="toggle-pw" onclick="togglePw('suPassword', this)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>

            <button class="auth-btn" id="signupBtn" onclick="handleSignUp()">
                <span id="signupBtnText">Create Account</span>
            </button>
            <div class="auth-message" id="signupMsg"></div>
        </div>

    </div>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/static/supabase-client.js"></script>
<script>
/* ── Auth Page Logic ──
   All functions declared at global scope FIRST so onclick="" attributes
   always resolve, regardless of Supabase SDK load order.
   ─────────────────────────────────────────────────────── */

// Generate patient ID immediately — no Supabase needed
function _genPid() {
    const y = new Date().getFullYear();
    const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let s = '';
    for (let i = 0; i < 6; i++) s += c[Math.floor(Math.random() * c.length)];
    return `RX-${y}-${s}`;
}
let generatedPatientId = _genPid();

/* ── UI helpers ── */
function switchTab(tab) {
    const si = document.getElementById('signinForm');
    const su = document.getElementById('signupForm');
    const ti = document.getElementById('tabSignIn');
    const tu = document.getElementById('tabSignUp');
    if (si) si.style.display = tab === 'signin' ? 'block' : 'none';
    if (su) su.style.display = tab === 'signup' ? 'block' : 'none';
    if (ti) ti.classList.toggle('active', tab === 'signin');
    if (tu) tu.classList.toggle('active', tab === 'signup');
}

function togglePw(inputId, btn) {
    const input = document.getElementById(inputId);
    if (!input) return;
    input.type = input.type === 'text' ? 'password' : 'text';
    btn.style.opacity = input.type === 'password' ? '0.5' : '1';
}

function _setLoad(btnId, textId, loading, label) {
    const b = document.getElementById(btnId);
    const t = document.getElementById(textId);
    if (b) b.disabled = loading;
    if (t) t.textContent = loading ? 'Please wait...' : label;
}

function showMsg(id, msg, type) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = msg;
    el.className = `auth-message ${type}`;
}

/* ── Sign Up ── */
async function handleSignUp() {
    const name  = (document.getElementById('suName')?.value     || '').trim();
    const email = (document.getElementById('suEmail')?.value    || '').trim();
    const phone = (document.getElementById('suPhone')?.value    || '').trim();
    const dob   =  document.getElementById('suDob')?.value      || '';
    const pw    =  document.getElementById('suPassword')?.value || '';

    if (!name || !email || !pw) {
        showMsg('signupMsg', 'Please fill in name, email and password.', 'error'); return;
    }
    if (pw.length < 6) {
        showMsg('signupMsg', 'Password must be at least 6 characters.', 'error'); return;
    }

    const auth = window.RuralXAuth;
    if (!auth) {
        showMsg('signupMsg', 'Auth service not ready — please refresh.', 'error'); return;
    }

    _setLoad('signupBtn', 'signupBtnText', true, '');
    try {
        await auth.signUp({ email, password: pw, full_name: name, phone, date_of_birth: dob, patient_id: generatedPatientId });
        showMsg('signupMsg', 'Account created successfully! Your unique Patient ID has been generated and will be sent to your email. You can now sign in.', 'success');
        setTimeout(() => switchTab('signin'), 4000);
    } catch (err) {
        console.error('SignUp error:', err);
        showMsg('signupMsg', err.message || 'Sign up failed. Please try again.', 'error');
    } finally {
        _setLoad('signupBtn', 'signupBtnText', false, 'Create Account');
    }
}

/* ── Sign In ── */
async function handleSignIn() {
    const email = (document.getElementById('siEmail')?.value    || '').trim();
    const pw    =  document.getElementById('siPassword')?.value || '';

    if (!email || !pw) {
        showMsg('signinMsg', 'Please enter email and password.', 'error'); return;
    }

    const auth = window.RuralXAuth;
    if (!auth) {
        showMsg('signinMsg', 'Auth service not ready — please refresh.', 'error'); return;
    }

    _setLoad('signinBtn', 'signinBtnText', true, '');
    try {
        await auth.signIn({ email, password: pw });
        window.location.href = '/app';
    } catch (err) {
        console.error('SignIn error:', err);
        showMsg('signinMsg', err.message || 'Sign in failed. Check your credentials.', 'error');
    } finally {
        _setLoad('signinBtn', 'signinBtnText', false, 'Sign In');
    }
}

/* ── Init on DOM ready ── */
document.addEventListener('DOMContentLoaded', () => {
    // Tab from URL param
    const mode = new URLSearchParams(window.location.search).get('mode');
    switchTab(mode === 'signin' ? 'signin' : 'signup');

    // Redirect if already logged in
    if (window.RuralXAuth) {
        window.RuralXAuth.getSession()
            .then(s => { if (s) window.location.href = '/app'; })
            .catch(() => {});
    }
});
</script>
</body>
</html>
